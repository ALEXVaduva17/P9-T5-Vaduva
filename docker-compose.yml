version: "3.9"

services:
  # ── PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    container_name: fitness_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitness_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitness_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-fitness_center_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitness_user} -d ${POSTGRES_DB:-fitness_center_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitness_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://fitness_user:fitness_secret_password@db:5432/fitness_center_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-secret}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  # ── React + Vite Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitness_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
